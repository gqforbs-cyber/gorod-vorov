<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOROD VOROV</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
height:100%;
background:black;
overflow:hidden;
font-family:Arial, sans-serif;
color:white;
}

#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

.content{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

h1{
font-size:42px;
margin-bottom:25px;
}

button{
padding:15px 45px;
font-size:18px;
border:none;
border-radius:14px;
background:#e10600;
color:white;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="bg.mp4.mov">
</video>

<div class="overlay"></div>

<div class="content">
  <h1>GOROD VOROV</h1>
  <button>PLAY</button>
</div>

</body>
</html>
