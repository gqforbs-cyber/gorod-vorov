<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOROD VOROV</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:Arial, sans-serif;
  color:white;
}

/* Видео фон (для вертикального видео) */
#bg-video {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center center;
  z-index:-2;
}

.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:-1;
}

.content {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1 {
  font-size:42px;
  letter-spacing:2px;
  margin-bottom:25px;
  text-shadow:0 8px 25px rgba(0,0,0,0.6);
}

button {
  padding:15px 45px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#e10600;
  color:white;
  cursor:pointer;
  transition:0.2s ease;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

button:active {
  transform:scale(0.97);
}

button:hover {
  background:#ff1a1a;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="bg.mp4.MOV" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="content">
  <h1>GOROD VOROV</h1>
  <button>PLAY</button>
</div>

</body>
</html>
