<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOROD VOROV</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; overflow: hidden; font-family: Arial, sans-serif; color: #fff; }

    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      background: #000;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: -1;
    }

    .content {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    h1 { font-size: 42px; letter-spacing: 1px; margin-bottom: 22px; }

    button {
      padding: 15px 48px;
      font-size: 18px;
      border: 0;
      border-radius: 14px;
      background: #e10600;
      color: #fff;
    }
  </style>
</head>

<body>
  <video id="bg" autoplay muted loop playsinline preload="auto"></video>
  <div class="overlay"></div>

  <div class="content">
    <h1>GOROD VOROV</h1>
    <button>PLAY</button>
  </div>

  <script>
    (async () => {
      const candidates = [
        { src: "bg.mp4", type: "video/mp4" },
        { src: "bg.mp4.mov", type: "video/quicktime" },
        { src: "bg.mp4.MOV", type: "video/quicktime" }
      ];

      const v = document.getElementById("bg");

      // анти-кэш (чтобы точно подтянуло новое после замены/удаления)
      const cacheBuster = "v=" + Date.now();

      for (const c of candidates) {
        try {
          const url = c.src + "?" + cacheBuster;
          const res = await fetch(url, { method: "HEAD" });
          if (res.ok) {
            const source = document.createElement("source");
            source.src = url;
            source.type = c.type;
            v.innerHTML = "";
            v.appendChild(source);

            // пробуем запустить
            await v.play().catch(() => {});
            return;
          }
        } catch (e) {}
      }

      // если ничего не нашлось — просто остаётся чёрный фон
      console.log("Background video not found. Check file name in repo root.");
    })();
  </script>
</body>
</html>
