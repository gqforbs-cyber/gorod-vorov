<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOROD VOROV</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  font-family:Arial, sans-serif;
  color:white;
  overflow:hidden;
  background:black;
}

/* ФОН */
body{
  background-image: url("IMG_3206.jpeg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* затемнение */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:0;
}

/* контент */
.content{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1{
  font-size:42px;
  margin-bottom:25px;
  letter-spacing:1px;
}

button{
  padding:15px 48px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#e10600;
  color:white;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">
  <h1>GOROD VOROV</h1>
  <button>PLAY</button>
</div>

</body>
</html>
