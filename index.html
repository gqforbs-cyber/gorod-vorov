<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOROD VOROV</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  font-family:Arial, sans-serif;
  overflow:hidden;
  background:black;
}

/* ФОН */
body{
  background-image: url("IMG_3206.jpeg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* затемнение */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
}

/* КНОПКА */
.play-container{
  position:absolute;
  bottom:20px;   /* опустили ниже */
  left:50%;
  transform:translateX(-50%);
}

button{
  padding:16px 55px;   /* вернули прежний размер */
  font-size:20px;
  border:none;
  border-radius:16px;
  background:#e10600;
  color:white;
  transition:0.1s;
}

/* эффект нажатия */
button:active{
  transform:scale(0.95);
  background:#b90500;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="play-container">
  <button onclick="goNext()">PLAY</button>
</div>

<script>
function goNext(){
  window.location.href="page2.html";
}
</script>

</body>
</html>
