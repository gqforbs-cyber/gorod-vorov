<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOROD VOROV</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
  background: black;
}

/* ===== Видео фон (идеально центрируется) ===== */
#bg-video {
  position: fixed;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  object-position: center center;
  z-index: -2;
}

/* затемнение поверх видео */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  z-index: -1;
}

/* контент */
.content {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

h1 {
  font-size: 42px;
  letter-spacing: 2px;
  margin-bottom: 25px;
}

button {
  padding: 15px 40px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #e10600;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff1a1a;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="bg.mp4.MOV" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="content">
  <h1>GOROD VOROV</h1>
  <button onclick="alert('Игра скоро будет доступна')">PLAY</button>
</div>

</body>
</html>
