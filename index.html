<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOROD VOROV</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body{
      margin:0;
      padding:0;
      font-family: Arial, sans-serif;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(180deg,#050c1c,#0b1a3a);
      color:white;
      text-align:center;
    }

    .container{
      width:90%;
      max-width:500px;
    }

    h1{
      font-size:42px;
      letter-spacing:4px;
      margin-bottom:40px;
      text-transform:uppercase;
    }

    .play-btn{
      padding:15px 40px;
      font-size:20px;
      border-radius:15px;
      border:none;
      background:#76ffb8;
      color:#001b1f;
      cursor:pointer;
      font-weight:bold;
      transition:0.2s;
    }

    .play-btn:active{
      transform:scale(0.95);
    }

    .slogan{
      margin-top:60px;
      font-size:14px;
      opacity:0.7;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>GOROD VOROV</h1>

    <button class="play-btn" onclick="startGame()">PLAY</button>

    <div class="slogan">
      Мы найдем способ или создадим его
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    tg?.ready();
    tg?.expand();

    function startGame(){
      tg?.HapticFeedback?.impactOccurred("medium");
      alert("Игра скоро начнется...");
    }
  </script>

</body>
</html>
