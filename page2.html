<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOROD VOROV</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  font-family:Arial, sans-serif;
  color:white;
  overflow:hidden;
}

/* ФОН */
body{
  background:url("IMG_3251.jpeg") center/cover no-repeat;
  position:relative;
}

/* затемнение + блюр */
body::before{
  content:"";
  position:absolute;
  inset:0;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.6);
}

/* контейнер */
.container{
  position:relative;
  z-index:1;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:20px;
  gap:20px;
}

/* блок */
.section{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:20px;
}

.section h2{
  margin-bottom:15px;
  font-size:18px;
  letter-spacing:2px;
}

.item{
  padding:12px 15px;
  margin-bottom:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  cursor:pointer;
  transition:0.2s;
}

.item:hover{
  background:rgba(225,6,0,0.5);
}

.online{
  color:#00ff7f;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="section">
    <h2>Support</h2>
    <div class="item" onclick="alert('Krista')">
      Krista <span class="online">(online)</span>
    </div>
    <div class="item" onclick="alert('Desmond')">
      Desmond <span class="online">(online)</span>
    </div>
    <div class="item" onclick="alert('Clare')">
      Clare <span class="online">(online)</span>
    </div>
  </div>

  <div class="section">
    <h2>Administration</h2>
    <div class="item" onclick="alert('Doug')">
      Doug
    </div>
  </div>

  <div class="section">
    <h2>Boss</h2>
    <div class="item" onclick="alert('Gorod Vorov')">
      Gorod Vorov
    </div>
  </div>

</div>

</body>
</html>
