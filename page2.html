<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GOROD VOROV — Page 2</title>

  <style>
    :root{
      --bg: #070707;
      --card: rgba(0,0,0,.55);
      --row: rgba(255,255,255,.10);
      --row2: rgba(255,255,255,.12);
      --text: #ffffff;
      --muted: rgba(255,255,255,.75);
      --green: #45ff7a;
      --red: #9b1b1b;
      --radius: 26px;
    }

    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background: var(--bg);
    }

    /* Чтобы в Telegram WebApp не было “пустоты” и можно было листать */
    body{
      min-height:100vh;
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Фон */
    .bg{
      position:fixed;
      inset:0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,.70)),
        url("IMG_3251.jpeg") center/cover no-repeat;
      transform: scale(1.06);
      filter: blur(10px);
      z-index:-2;
    }
    .bg2{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.25);
      z-index:-1;
    }

    .wrap{
      width: min(520px, 100%);
      margin: 0 auto;
      padding:
        calc(env(safe-area-inset-top) + 18px)
        16px
        calc(env(safe-area-inset-bottom) + 28px);
    }

    .panel{
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 16px 16px;
      box-shadow: 0 18px 40px rgba(0,0,0,.45);
      margin-bottom: 18px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .title{
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: none;
      font-size: 28px;
      margin: 0 0 12px;
    }

    .list{ display:flex; flex-direction:column; gap:12px; }

    .person{
      display:flex;
      align-items:center;
      gap:12px;
      width:100%;
      text-decoration:none;
      color:var(--text);
      background: var(--row);
      border-radius: 18px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,.10);
      transition: transform .08s ease, background .15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .person:active{
      transform: scale(.99);
      background: var(--row2);
    }

    .avatar{
      width:44px;
      height:44px;
      border-radius: 14px;
      overflow:hidden;
      flex:0 0 44px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
    }
    .avatar img{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
    }

    .ptext{ display:flex; align-items:baseline; gap:8px; }
    .name{ font-size: 22px; font-weight: 650; letter-spacing:.02em; }
    .status{ font-size: 20px; color: var(--green); font-weight: 650; }

    /* Doug красным */
    .adminRow{
      background: rgba(155, 27, 27, .75);
      border: 1px solid rgba(255,255,255,.10);
    }
    .adminRow:active{
      background: rgba(155, 27, 27, .88);
    }

    /* Нижний блок реквизитов */
    .subTitle{
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 12px;
      color: rgba(255,255,255,.92);
    }

    .btnRow{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }
    .miniBtn{
      flex: 1 1 calc(50% - 12px);
      min-width: 140px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.10);
      color: var(--text);
      font-weight: 800;
      font-size: 18px;
      letter-spacing:.02em;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .miniBtn:active{
      background: rgba(255,255,255,.14);
      transform: scale(.99);
    }

    /* Модалка */
    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      background: rgba(0,0,0,.55);
      z-index:50;
    }
    .modal.show{ display:flex; }
    .modalBox{
      width: min(520px, 100%);
      background: rgba(20,20,20,.92);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      padding: 18px 16px 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .modalText{
      font-size: 18px;
      color: rgba(255,255,255,.92);
      line-height:1.35;
      margin: 0 0 14px;
      text-align:center;
    }
    .closeBtn{
      width:100%;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.10);
      color: var(--text);
      font-weight: 800;
      font-size: 16px;
      cursor:pointer;
    }
    .closeBtn:active{ background: rgba(255,255,255,.14); transform:scale(.99); }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="bg2"></div>

  <div class="wrap">

    <!-- SUPPORT -->
    <section class="panel">
      <h2 class="title">Support</h2>

      <div class="list">
        <a class="person" href="https://t.me/Gorod_vorov_KristaADM" target="_blank" rel="noopener">
          <span class="avatar"><img src="IMG_3269.png" alt="Krista"></span>
          <span class="ptext">
            <span class="name">Krista</span>
            <span class="status">(online)</span>
          </span>
        </a>

        <a class="person" href="https://t.me/Gorod_vorov_DesmondADM" target="_blank" rel="noopener">
          <span class="avatar"><img src="IMG_3268.png" alt="Desmond"></span>
          <span class="ptext">
            <span class="name">Desmond</span>
            <span class="status">(online)</span>
          </span>
        </a>

        <a class="person" href="https://t.me/Gorod_vorov_ClareADM" target="_blank" rel="noopener">
          <span class="avatar"><img src="IMG_3267.png" alt="Clare"></span>
          <span class="ptext">
            <span class="name">Clare</span>
            <span class="status">(online)</span>
          </span>
        </a>
      </div>
    </section>

    <!-- ADMINISTRATION -->
    <section class="panel">
      <h2 class="title">Administration</h2>

      <div class="list">
        <a class="person adminRow" href="https://t.me/Gorod_Vorov_ADM" target="_blank" rel="noopener">
          <span class="avatar"><img src="IMG_3266.png" alt="Doug"></span>
          <span class="ptext">
            <span class="name">Doug</span>
          </span>
        </a>
      </div>
    </section>

    <!-- BOSS -->
    <section class="panel">
      <h2 class="title">Boss</h2>

      <div class="list">
        <a class="person" href="https://t.me/Gorod_vorov01ADM" target="_blank" rel="noopener">
          <span class="avatar"><img src="IMG_3265.png" alt="Gorod Vorov"></span>
          <span class="ptext">
            <span class="name">Gorod Vorov</span>
          </span>
        </a>
      </div>
    </section>

    <!-- НИЖЕ: РЕКВИЗИТЫ -->
    <section class="panel">
      <h3 class="subTitle">Реквизиты в наличии</h3>

      <div class="btnRow">
        <button class="miniBtn" type="button" data-popup="АПК">АПК</button>
        <button class="miniBtn" type="button" data-popup="локал">локал</button>
        <button class="miniBtn" type="button" data-popup="касса">касса</button>
        <button class="miniBtn" type="button" data-popup="ЮР">ЮР</button>
      </div>
    </section>

  </div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modalBox">
      <p class="modalText" id="modalText">наличие уточнять у support</p>
      <button class="closeBtn" type="button" id="closeModal">OK</button>
    </div>
  </div>

  <script>
    (function(){
      const modal = document.getElementById('modal');
      const closeBtn = document.getElementById('closeModal');

      function openModal(){
        modal.classList.add('show');
      }
      function closeModal(){
        modal.classList.remove('show');
      }

      document.querySelectorAll('[data-popup]').forEach(btn=>{
        btn.addEventListener('click', openModal);
      });

      closeBtn.addEventListener('click', closeModal);
      modal.addEventListener('click', (e)=>{
        if(e.target === modal) closeModal();
      });
    })();
  </script>
</body>
</html>
