<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOROD VOROV</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  min-height:100%;
  font-family:Arial, sans-serif;
  color:white;
}

/* ФОН */
body{
  background:url("IMG_3251.jpeg") center/cover no-repeat fixed;
  position:relative;
}

/* затемнение + блюр */
body::before{
  content:"";
  position:fixed;
  inset:0;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.6);
  z-index:0;
}

/* контейнер */
.container{
  position:relative;
  z-index:1;
  padding:30px 20px 80px 20px;
  display:flex;
  flex-direction:column;
  gap:25px;
}

/* блок */
.section{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:20px;
}

.section h2{
  margin-bottom:15px;
  font-size:18px;
  letter-spacing:2px;
}

.item{
  padding:14px 15px;
  margin-bottom:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  cursor:pointer;
  transition:0.2s;
}

.item:hover{
  background:rgba(225,6,0,0.5);
}

.online{
  color:#00ff7f;
  font-size:14px;
}

/* КНОПКИ РЕКВИЗИТОВ */
.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:15px;
}

.req-btn{
  flex:1 1 calc(50% - 6px);
  padding:14px;
  border:none;
  border-radius:14px;
  background:#e10600;
  color:white;
  font-weight:bold;
  letter-spacing:1px;
  cursor:pointer;
  transition:0.2s;
}

.req-btn:active{
  transform:scale(0.95);
  background:#b90500;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.7);
  z-index:999;
}

.popup-box{
  background:#111;
  padding:25px;
  border-radius:20px;
  text-align:center;
  max-width:300px;
}

.popup-box button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#e10600;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="section">
    <h2>Support</h2>
    <div class="item">Krista <span class="online">(online)</span></div>
    <div class="item">Desmond <span class="online">(online)</span></div>
    <div class="item">Clare <span class="online">(online)</span></div>
  </div>

  <div class="section">
    <h2>Administration</h2>
    <div class="item">Doug</div>
  </div>

  <div class="section">
    <h2>Boss</h2>
    <div class="item">Gorod Vorov</div>
  </div>

  <!-- НОВЫЙ БЛОК -->
  <div class="section">
    <h2>Реквизиты в наличии</h2>
    <div class="buttons">
      <button class="req-btn" onclick="openPopup()">АПК</button>
      <button class="req-btn" onclick="openPopup()">Локал</button>
      <button class="req-btn" onclick="openPopup()">Касса</button>
      <button class="req-btn" onclick="openPopup()">ЮР</button>
    </div>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    Наличие уточнять у support
    <br>
    <button onclick="closePopup()">Закрыть</button>
  </div>
</div>

<script>
function openPopup(){
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
